<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>喝酒摇骰子 · 3D 豪华版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <style>
    :root{
      --card: rgba(255,255,255,.08);
      --bd: rgba(255,255,255,.14);
      --txt: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.66);
      --gold: #ffd54f;
      --shadow: 0 16px 40px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(130,120,255,.20), transparent 55%),
        radial-gradient(900px 600px at 80% 55%, rgba(50,220,180,.16), transparent 60%),
        radial-gradient(700px 450px at 35% 95%, rgba(255,150,80,.12), transparent 60%),
        radial-gradient(circle at top, #1c283d 0, #050816 45%, #000 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--txt);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    header {
      width: min(760px, 100vw);
      padding: 12px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top: 6px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: 1px solid var(--bd);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    header .title{ font-weight: 800; font-size: 16px; letter-spacing:.2px; }
    header .sub{ font-size: 12px; color: var(--muted); margin-top: 2px; }
    header .right{ display:flex; align-items:center; gap:8px; flex-wrap: wrap; justify-content:flex-end; }

    .pill{
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.28);
      color: rgba(255,255,255,.82);
      font-size: 12px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .pill strong{ color:#fff; font-weight: 800; }

    #app { position: relative; flex: 1; width: 100vw; display:flex; flex-direction: column; align-items: center; padding-top: 10px; }
    #stage {
      position: relative;
      width: min(680px, 100vw);
      height: min(680px, 68vh);
      touch-action: none;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.12));
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    #three-container { width:100%; height:100%; }

    #hintbar{
      position:absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:10px;
    }
    #hintbar .k{ opacity:.92; display:flex; gap:8px; flex-wrap: wrap; }
    #hintbar .dot{
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,213,79,.55);
      margin-top: 2px;
    }
    #status{ opacity:.85; font-variant-numeric: tabular-nums; white-space: nowrap; }

    #settings-btn {
      position:absolute;
      bottom: 16px; right: 16px;
      width: 44px; height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      color: var(--gold);
      font-size: 18px;
      cursor:pointer;
      z-index: 11;
      box-shadow: 0 10px 20px rgba(0,0,0,.35);
      transition: transform .12s ease, background .15s ease;
    }
    #settings-btn:hover{ background: rgba(0,0,0,.68); transform: translateY(-1px); }
    #settings-btn:active{ transform: translateY(0px) scale(.98); }

    #roll-btn{
      position:absolute;
      bottom: 16px; left: 16px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,213,79,.92), rgba(255,193,7,.75));
      color:#1a1a1a;
      font-weight: 900;
      letter-spacing:.2px;
      cursor:pointer;
      z-index: 11;
      box-shadow: 0 12px 24px rgba(0,0,0,.35);
      transition: transform .12s ease, filter .15s ease;
      user-select:none;
    }
    #roll-btn:hover{ filter: brightness(1.04); transform: translateY(-1px); }
    #roll-btn:active{ transform: translateY(0px) scale(.99); }

    #history-panel {
      width: min(760px, 100vw);
      padding: 10px 12px 12px;
      margin-bottom: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.28));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      font-size: 12px;
      max-height: 32vh;
      overflow-y: auto;
    }
    #history-panel .title{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-size: 13px; margin-bottom: 8px; opacity: .95; font-weight: 800;
    }
    #history-panel .title .small{ font-size:12px; font-weight: 500; opacity:.65; }
    #history-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction: column; gap:8px; }
    #history-list li{
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    #history-list .left{ display:flex; align-items:center; gap:8px; min-width: 0; }
    #history-list .time{ opacity:.65; font-variant-numeric: tabular-nums; white-space: nowrap; }
    #history-list .values{ opacity:.92; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width: 52vw; }
    #history-list .sum{
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      font-weight: 900;
      white-space: nowrap;
    }

    #settings-panel {
      position: fixed; inset: 0;
      display:flex; align-items:center; justify-content:center;
      background: rgba(0,0,0,.60);
      z-index: 100;
      padding: 18px;
    }
    #settings-panel.hidden{ display:none; }
    .settings-inner{
      width: min(360px, 100%);
      padding: 16px 16px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.35));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 45px rgba(0,0,0,.55);
      backdrop-filter: blur(12px);
    }
    .settings-inner h2{ margin:0 0 10px; font-size:16px; letter-spacing:.2px; }
    .settings-inner label{ display:block; margin-bottom:10px; font-size:14px; color: rgba(255,255,255,.86); }
    .settings-inner input[type="number"]{
      width: 92px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.35);
      color:#fff;
      outline:none;
    }
    .settings-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }
    .settings-actions button{
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      cursor:pointer;
      font-size:13px;
      font-weight: 800;
      transition: transform .12s ease, filter .15s ease;
    }
    #save-settings{ background: linear-gradient(180deg, rgba(255,213,79,.92), rgba(255,193,7,.75)); color:#1a1a1a; }
    #close-settings{ background: rgba(0,0,0,.35); color: rgba(255,255,255,.9); }
    .settings-actions button:hover{ filter: brightness(1.05); transform: translateY(-1px); }
    .settings-actions button:active{ transform: translateY(0px) scale(.99); }
  </style>
</head>

<body>
<header>
  <div>
    <div class="title">🍻 喝酒摇骰子 · 3D 豪华版</div>
    <div class="sub">点击摇 / 上滑开杯 / 下滑盖杯 · 拉丝不锈钢 · 伪物理骰子</div>
  </div>
  <div class="right">
    <div class="pill">状态：<strong id="header-status">待机</strong></div>
    <div class="pill">骰子：<strong id="header-count">-</strong></div>
  </div>
</header>

<div id="app">
  <div id="stage">
    <div id="three-container"></div>

    <div id="hintbar">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <span class="dot"></span>
        <div class="k">
          <span>👆 点击：摇</span>
          <span>⬆️ 上滑：开杯</span>
          <span>⬇️ 下滑：盖杯</span>
        </div>
      </div>
      <div id="status">准备中…</div>
    </div>

    <button id="roll-btn">🎲 摇一摇</button>
    <button id="settings-btn" title="设置">⚙️</button>
  </div>
</div>

<div id="history-panel">
  <div class="title">
    <span>历史记录（最新在上）</span>
    <span class="small">保留最近 20 次</span>
  </div>
  <ul id="history-list"></ul>
</div>

<div id="settings-panel" class="hidden">
  <div class="settings-inner">
    <h2>设置</h2>
    <label>
      骰子个数（3 - 10）：
      <input id="dice-count-input" type="number" min="3" max="10" />
    </label>
    <div style="font-size: 12px; opacity: 0.75; line-height: 1.6;">
      提示：骰子个数会写入 Cookie，刷新页面会保留。
    </div>
    <div class="settings-actions">
      <button id="close-settings">取消</button>
      <button id="save-settings">保存</button>
    </div>
  </div>
</div>

<audio id="dice-sound" src="dice-shake.mp3" preload="auto"></audio>

<script>
  // ---------- Cookie ----------
  function getCookie(name) {
    const value = "; " + document.cookie;
    const parts = value.split("; " + name + "=");
    if (parts.length === 2) return parts.pop().split(";").shift();
    return null;
  }
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
  }

  const DICE_HISTORY_KEY = "diceHistory";
  const DICE_COUNT_KEY = "diceCount";

  // ---------- DOM ----------
  const container = document.getElementById("three-container");
  const stage = document.getElementById("stage");
  const settingsBtn = document.getElementById("settings-btn");
  const rollBtn = document.getElementById("roll-btn");
  const settingsPanel = document.getElementById("settings-panel");
  const diceCountInput = document.getElementById("dice-count-input");
  const saveSettingsBtn = document.getElementById("save-settings");
  const closeSettingsBtn = document.getElementById("close-settings");
  const diceSound = document.getElementById("dice-sound");
  const historyList = document.getElementById("history-list");
  const statusEl = document.getElementById("status");
  const headerStatus = document.getElementById("header-status");
  const headerCount = document.getElementById("header-count");

  function setStatus(text){
    statusEl.textContent = text;
    headerStatus.textContent = text;
  }

  // ---------- Three.js global ----------
  let diceCount = 5;
  let diceMeshes = [];
  let diceBodies = []; // 伪物理数据
  let diceTextures = {}; // 1..6
  let scene, camera, renderer;
  let cupGroup;
  let plate;

  // ---------- 尺寸 ----------
  const TABLE_Y = 0;
  const DICE_SIZE = 0.8;
  const DICE_R = DICE_SIZE * 0.55; // 碰撞半径（简化）
  const CUP_HEIGHT = 4.0;
  const CUP_RADIUS_TOP = 2.0;
  const CUP_RADIUS_BOTTOM = 2.2;
  const CUP_THICKNESS = 0.14;

  const CUP_BOTTOM_CLOSED = TABLE_Y + 0.01;
  const CUP_BOTTOM_OPEN   = TABLE_Y + 0.70;  // 半开露点边
  const CUP_BOTTOM_LIFTED = TABLE_Y + 4.00;  // 完全抬起

  function bottomToGroupY(bottom) { return bottom + CUP_HEIGHT / 2; }

  // ---------- 杯子状态 ----------
  const CUP_STATE = {
    OPEN_TILT: "open_tilt",
    ROLLING: "rolling",
    READY: "ready",
    LIFTED: "lifted"
  };
  let cupState = CUP_STATE.OPEN_TILT;

  // ---------- 动画/伪物理参数 ----------
  let lastT = 0;
  let shakeStart = 0;
  let isRolling = false;
  let hasRolled = false;
  let currentResult = [];
  let settle = 0; // 0~1，摇完后缓慢静止的进度

  const PHYS = {
    impulse: 10.0,         // 摇动强度（越大越猛）
    swirl:  5.0,           // 旋转扰动
    dragRolling: 0.90,     // 摇动时阻尼（越小越快停）
    dragSettling: 0.82,    // 收尾时阻尼
    angDrag: 0.88,
    boundaryBounce: 0.78,
    diceRepel: 0.65,
    maxSpeed: 7.0,
    maxAng:  10.0,
  };

  // ---------- 手势拖动 ----------
  let isDragging = false;
  let pointerDownX = null;
  let pointerDownY = null;
  let pointerMoved = false;
  let dragMode = null;      // "open" | "close" | null
  let dragProgress = 0;     // 0~1
  const DRAG_DISTANCE = 180;

  // ---------- 历史 ----------
  function loadHistoryFromCookie() {
    const raw = getCookie(DICE_HISTORY_KEY);
    if (!raw) return [];
    try { return JSON.parse(decodeURIComponent(raw)); } catch { return []; }
  }
  function renderHistory(history) {
    historyList.innerHTML = "";
    const reversed = [...history].reverse();
    reversed.forEach((item) => {
      const li = document.createElement("li");
      const time = new Date(item.time);
      const timeStr = time.toLocaleTimeString();
      const valuesStr = item.values.join(",");
      const sum = item.values.reduce((a,b)=>a+b,0);

      li.innerHTML =
        `<div class="left">
          <span class="time">${timeStr}</span>
          <span class="values">[${valuesStr}]</span>
        </div>
        <div class="sum">Σ ${sum}</div>`;
      historyList.appendChild(li);
    });
  }
  function saveHistoryToCookie(values) {
    let history = loadHistoryFromCookie();
    history.push({ time: Date.now(), values });
    if (history.length > 20) history = history.slice(history.length - 20);
    setCookie(DICE_HISTORY_KEY, encodeURIComponent(JSON.stringify(history)), 365);
    renderHistory(history);
  }

  // ---------- 程序生成：拉丝金属纹理 ----------
  function makeBrushedMetalTexture(size=512){
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const ctx = c.getContext("2d");

    // 底色渐变
    const g = ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0, "#f3f3f3");
    g.addColorStop(1, "#cfcfcf");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);

    // 拉丝线（横向）
    ctx.globalAlpha = 0.10;
    for(let y=0;y<size;y++){
      const a = 0.06 + Math.random()*0.08;
      ctx.globalAlpha = a;
      ctx.fillStyle = (Math.random() > 0.5) ? "#ffffff" : "#000000";
      ctx.fillRect(0,y,size,1);
      if (Math.random() < 0.06) {
        ctx.globalAlpha = 0.12;
        ctx.fillRect(0,y,size,2);
      }
    }

    // 噪点
    ctx.globalAlpha = 0.05;
    for(let i=0;i<size*size*0.03;i++){
      const x = (Math.random()*size)|0;
      const y = (Math.random()*size)|0;
      ctx.fillStyle = (Math.random()>0.5) ? "#fff" : "#000";
      ctx.fillRect(x,y,1,1);
    }

    // 轻微暗角
    ctx.globalAlpha = 0.25;
    const rg = ctx.createRadialGradient(size*0.5,size*0.45,size*0.2,size*0.5,size*0.5,size*0.75);
    rg.addColorStop(0, "rgba(255,255,255,0)");
    rg.addColorStop(1, "rgba(0,0,0,0.35)");
    ctx.fillStyle = rg;
    ctx.fillRect(0,0,size,size);

    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1.5, 1.5);
    tex.anisotropy = 8;
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  // ---------- 画骰子纹理 ----------
  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
  function createDiceTextures() {
    function pipPositions(size) {
      const s = size;
      const r = s * 0.10;
      const off = s * 0.25;
      return {
        center: { x: s / 2, y: s / 2 },
        tl: { x: s / 2 - off, y: s / 2 - off },
        tr: { x: s / 2 + off, y: s / 2 - off },
        bl: { x: s / 2 - off, y: s / 2 + off },
        br: { x: s / 2 + off, y: s / 2 + off },
        ml: { x: s / 2 - off, y: s / 2 },
        mr: { x: s / 2 + off, y: s / 2 },
        r,
      };
    }

    for (let n = 1; n <= 6; n++) {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      const grd = ctx.createRadialGradient(
        size * 0.25, size * 0.25, size * 0.12,
        size * 0.8, size * 0.8, size * 0.95
      );
      grd.addColorStop(0, "#ffffff");
      grd.addColorStop(1, "#cfcfcf");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, size, size);

      ctx.lineWidth = size * 0.05;
      ctx.strokeStyle = "#9f9f9f";
      ctx.fillStyle = "#fdfdfd";
      ctx.shadowColor = "rgba(0,0,0,0.22)";
      ctx.shadowBlur = size * 0.05;

      roundRectPath(ctx, size * 0.08, size * 0.08, size * 0.84, size * 0.84, size * 0.18);
      ctx.fill();
      ctx.stroke();

      const p = pipPositions(size);
      ctx.fillStyle = "#1f1f1f";
      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = size * 0.035;

      function drawDot(pos) {
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      switch (n) {
        case 1: drawDot(p.center); break;
        case 2: drawDot(p.tl); drawDot(p.br); break;
        case 3: drawDot(p.tl); drawDot(p.center); drawDot(p.br); break;
        case 4: drawDot(p.tl); drawDot(p.tr); drawDot(p.bl); drawDot(p.br); break;
        case 5: drawDot(p.tl); drawDot(p.tr); drawDot(p.center); drawDot(p.bl); drawDot(p.br); break;
        case 6: drawDot(p.tl); drawDot(p.tr); drawDot(p.ml); drawDot(p.mr); drawDot(p.bl); drawDot(p.br); break;
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = 8;
      diceTextures[n] = texture;
    }
  }

  // ---------- 布局 ----------
  function computeDiceLayout(count) {
    const positions = [];
    const maxR = (CUP_RADIUS_BOTTOM - CUP_THICKNESS) - DICE_SIZE * 0.75;
    const minDist = DICE_SIZE * 1.25;

    for (let i = 0; i < count; i++) {
      let placed = false;
      for (let tries = 0; tries < 200; tries++) {
        const r = Math.random() * maxR;
        const a = Math.random() * Math.PI * 2;
        const x = Math.cos(a) * r;
        const z = Math.sin(a) * r;

        let ok = true;
        for (const p of positions) {
          const dx = x - p.x;
          const dz = z - p.z;
          if (Math.hypot(dx,dz) < minDist) { ok = false; break; }
        }
        if (ok) { positions.push({x,z}); placed = true; break; }
      }
      if (!placed) {
        positions.length = 0;
        const cols = Math.ceil(Math.sqrt(count));
        const spacing = DICE_SIZE * 1.35;
        for (let j = 0; j < count; j++) {
          const row = Math.floor(j / cols);
          const col = j % cols;
          positions.push({ x: (col - (cols - 1)/2) * spacing, z: (row - (cols - 1)/2) * spacing });
        }
        break;
      }
    }
    return positions;
  }

  // ---------- 创建杯子（内壁+杯底+厚度） ----------
  function createCup() {
    const metalTex = makeBrushedMetalTexture(512);

    const cupOuterMat = new THREE.MeshPhysicalMaterial({
      color: 0xe6e6e6,
      metalness: 1.0,
      roughness: 0.20,
      clearcoat: 0.85,
      clearcoatRoughness: 0.14,
      bumpMap: metalTex,
      bumpScale: 0.02,
      roughnessMap: metalTex,
      envMapIntensity: 1.1,
      side: THREE.DoubleSide,
    });

    // 内壁略暗、略粗糙一点
    const cupInnerMat = new THREE.MeshPhysicalMaterial({
      color: 0xcfcfcf,
      metalness: 1.0,
      roughness: 0.28,
      clearcoat: 0.70,
      clearcoatRoughness: 0.18,
      bumpMap: metalTex,
