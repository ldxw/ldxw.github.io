<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
fetch("https://api.github.com/repos/ldxw/rustdesk/releases")
  .then(r => r.json())
  .then(list => {
    const release = list.find(item => /^v?\d+\.\d+\.\d+$/.test(item.tag_name));
    if (release && release.html_url) {
      location.replace(release.html_url);
    }
  });
</script>
</head>
<body></body>
</html>
